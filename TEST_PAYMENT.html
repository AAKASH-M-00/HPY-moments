<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="max-w-md mx-auto mt-10 p-6 bg-white rounded-lg shadow-lg">
        <h1 class="text-2xl font-bold mb-4">Payment System Test</h1>
        
        <div class="mb-4 p-4 bg-blue-50 rounded-lg">
            <p class="text-sm"><strong>Test Step 1:</strong> Click button below to open booking modal</p>
        </div>
        
        <button onclick="testOpenModal()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg mb-4">
            🧪 Open Booking Modal
        </button>
        
        <div id="log" class="p-4 bg-gray-100 rounded-lg text-sm font-mono max-h-40 overflow-y-auto">
            <p class="text-gray-600">Logs will appear here...</p>
        </div>
    </div>

    <!-- Booking Modal from main website -->
    <div id="booking-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto">
            <div class="sticky top-0 bg-white border-b border-gray-100 p-6 flex justify-between items-center">
                <h2 class="text-2xl font-bold">Complete Your Booking</h2>
                <button onclick="closeBookingModal()" class="text-gray-500 hover:text-black text-2xl"><i>✕</i></button>
            </div>
            
            <form id="payment-booking-form" class="p-6 space-y-4" onsubmit="handlePaymentBooking(event)">
                <!-- Package Info (Read-only) -->
                <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                    <p class="text-sm text-gray-600">Selected Package</p>
                    <p id="modal-package-name" class="text-lg font-bold">Bali Getaway</p>
                    <p id="modal-package-price" class="text-red-600 font-bold mt-1">₹75,000</p>
                </div>

                <!-- Name -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" id="booking-name" name="name" required placeholder="John Doe" class="w-full border border-gray-300 rounded-lg px-4 py-2.5">
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="booking-email" name="email" required placeholder="john@example.com" class="w-full border border-gray-300 rounded-lg px-4 py-2.5">
                </div>

                <!-- Phone -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                    <input type="tel" id="booking-phone" name="phone" required placeholder="+91 98765 43210" class="w-full border border-gray-300 rounded-lg px-4 py-2.5">
                </div>

                <!-- Travelers -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Number of Travelers</label>
                    <input type="number" id="booking-travelers" name="travelers" required min="1" max="10" value="1" class="w-full border border-gray-300 rounded-lg px-4 py-2.5">
                </div>

                <!-- Total Price -->
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-600">Total Amount</span>
                        <span id="modal-total-price" class="text-2xl font-bold text-red-600">₹75,000</span>
                    </div>
                </div>

                <!-- Terms -->
                <div class="flex items-center">
                    <input type="checkbox" id="terms-checkbox" required class="h-4 w-4 rounded">
                    <label for="terms-checkbox" class="ml-2 text-sm text-gray-600">I agree to the terms and conditions</label>
                </div>

                <!-- Proceed to Payment -->
                <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg">
                    Proceed to Payment →
                </button>
            </form>
        </div>
    </div>

    <script>
        function log(msg) {
            const logDiv = document.getElementById('log');
            const p = document.createElement('p');
            p.textContent = '✓ ' + msg;
            p.style.color = msg.includes('ERROR') ? 'red' : 'green';
            logDiv.appendChild(p);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        window.currentPackage = null;

        function testOpenModal() {
            log('testOpenModal() called');
            
            window.currentPackage = {
                name: 'Bali Getaway',
                price: '75000',
                id: 1,
                totalPrice: 75000
            };
            
            log('Set currentPackage');
            
            document.getElementById('modal-package-name').textContent = 'Bali Getaway';
            log('Updated package name');
            
            document.getElementById('modal-package-price').textContent = '₹75,000';
            log('Updated package price');
            
            document.getElementById('booking-travelers').value = 1;
            log('Reset travelers to 1');
            
            document.getElementById('modal-total-price').textContent = '₹75,000';
            log('Updated total price');
            
            const modal = document.getElementById('booking-modal');
            modal.classList.remove('hidden');
            log('Modal shown - class "hidden" removed');
            log('✅ SUCCESS - Modal should now be visible!');
        }

        function closeBookingModal() {
            log('closeBookingModal() called');
            document.getElementById('booking-modal').classList.add('hidden');
            const form = document.getElementById('payment-booking-form');
            if (form) {
                form.reset();
                log('Form reset');
            }
        }

        function handlePaymentBooking(e) {
            e.preventDefault();
            log('handlePaymentBooking() called');
            
            const form = document.getElementById('payment-booking-form');
            const name = form.querySelector('input[name="name"]').value;
            const email = form.querySelector('input[name="email"]').value;
            const phone = form.querySelector('input[name="phone"]').value;
            const travelers = form.querySelector('input[name="travelers"]').value;
            
            log(`Form filled: ${name}, ${email}, ${phone}, ${travelers} travelers`);
            
            window.bookingData = {
                name, email, phone, travelers,
                packageName: window.currentPackage.name,
                amount: window.currentPackage.totalPrice
            };
            
            log(`✅ Would navigate to payment page now with: ${JSON.stringify(window.bookingData)}`);
        }
    </script>
</body>
</html>
